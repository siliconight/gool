name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin to the same godot-cpp branch the release workflow uses, so
  # CI proves the binding compiles against the version we'll ship.
  # Bump in lockstep with .github/workflows/release.yml and
  # godot/gool.gdextension's `compatibility_minimum`.
  GODOT_CPP_REF: '4.4'

jobs:
  # ----------------------------------------------------------------
  # Job 0: detect which kinds of files changed. Analysis jobs that
  # only have signal on C++ (clang-tidy is ~20 min on its own) gate
  # on `cpp` so they skip GDScript/docs-only pushes — e.g. every
  # Cluster B mixer-dock patch, which touches no engine code.
  #
  # v0.80.11: introduced to stop clang-tidy from running a full
  # 43-TU pass on pushes where no C++ changed. dorny/paths-filter
  # handles the push-vs-PR base-commit resolution. The `cpp` glob
  # includes .github/workflows/ci.yml itself so edits to this
  # workflow still trigger the analysis (validates the change).
  # ----------------------------------------------------------------
  changes:
    name: detect / changed-paths
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - 'src/**'
              - 'include/**'
              # v0.80.18: exclude version-bump-only changes. The version
              # header is touched on every release (kVersionPatch +
              # kVersionString + kVersionFull bump via sed) but doesn't
              # change any C++ behavior — clang-tidy / cppcheck / etc.
              # have nothing new to analyze. Pre-v0.80.18 every release
              # patch through v0.80.12-17 triggered the full C++
              # pipeline (clang-tidy alone is ~27 min) just because
              # this file changed.
              - '!include/audio_engine/version.h'
              - 'godot/src/**'
              - 'tests/**'
              # v0.80.18: removed '**/CMakeLists.txt'. The root file's
              # only routine change is the project(... VERSION X.Y.Z)
              # bump, which also doesn't affect what clang-tidy sees.
              # Actual CMake changes that matter (new source files,
              # changed compile flags) also touch src/ or include/,
              # which still trigger the cpp filter. Add back if you
              # need cmake-only changes to trigger full re-analysis.
              - 'cmake/**'
              - '.clang-tidy'
              - '.github/workflows/ci.yml'

  # ----------------------------------------------------------------
  # Job 1: build the engine library + run the unit-test suite.
  # ----------------------------------------------------------------
  build-and-test:
    name: engine / ${{ matrix.os }} / ${{ matrix.build_type }}
    # v0.80.18: skip on GDScript/docs/template/CI-config changes.
    # Pure GDScript patches can't break the C++ build or tests.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS support: the ogg_vorbis_decoder.cpp Wmaybe-uninitialized
        # pragma was Apple-Clang-incompatible (Clang doesn't recognize that
        # warning name; combined with -Werror it was fatal). Fixed in
        # v0.11.6 by gating the pragma on __GNUC__ && !__clang__.
        # If macOS regresses, the simplest mitigation is to re-disable
        # macos-latest in the matrix and file an issue.
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        # CI's build-and-test job intentionally compiles the MINIMAL
        # engine configuration: silent NullAudioBackend, no decoders.
        # As of v0.11.9, those flags default ON in CMakeLists.txt
        # (better experience for Godot adopters running cmake -S .),
        # so this job overrides them back to OFF explicitly. The
        # invariant: catch any code that accidentally requires
        # miniaudio or a specific decoder for the core library to
        # compile. The build-gdextension job below proves the full
        # config compiles; the release.yml pipeline tests the full
        # config end-to-end.
        run: cmake -S . -B build
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=OFF
              -DAUDIO_ENGINE_DECODERS_WAV=OFF
              -DAUDIO_ENGINE_DECODERS_OGG=OFF
              -DAUDIO_ENGINE_DECODERS_FLAC=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }}

  # ----------------------------------------------------------------
  # Job 1b: sanitizer builds.
  #
  # ASAN+UBSAN catches: heap/stack overflows, use-after-free, leaks,
  # double-free, signed-int overflow, null derefs, misaligned loads,
  # bad shifts. ~2-3x runtime overhead. Combined into one job since
  # the two sanitizers compose.
  #
  # TSAN catches: data races, lock-order inversions, threadsafe-library
  # misuse. ~5-15x runtime overhead. Separate job because TSAN is
  # incompatible with ASAN at link time.
  #
  # Linux only. macOS Clang's TSAN is flakier and adds runner cost;
  # Windows MSVC has no TSAN at all and patchy UBSAN. The bugs these
  # sanitizers find are platform-independent, so Linux coverage gives
  # us the full diagnostic value.
  #
  # `AUDIO_ENGINE_SANITIZE_ASAN` and `AUDIO_ENGINE_SANITIZE_TSAN` are
  # mutually exclusive CMake options; both blocks below also pass
  # `-DCMAKE_BUILD_TYPE=RelWithDebInfo` for readable sanitizer
  # stacktraces.
  # ----------------------------------------------------------------
  sanitize-asan-ubsan:
    name: sanitize / asan+ubsan / ubuntu
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build-asan
              -DCMAKE_BUILD_TYPE=RelWithDebInfo
              -DAUDIO_ENGINE_SANITIZE_ASAN=ON
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=OFF
              -DAUDIO_ENGINE_DECODERS_WAV=OFF
              -DAUDIO_ENGINE_DECODERS_OGG=OFF
              -DAUDIO_ENGINE_DECODERS_FLAC=OFF

      - name: Build
        run: cmake --build build-asan --config RelWithDebInfo --parallel

      - name: Test
        working-directory: build-asan
        env:
          ASAN_OPTIONS:  "detect_leaks=1:halt_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: ctest --output-on-failure -C RelWithDebInfo

  sanitize-tsan:
    name: sanitize / tsan / ubuntu
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build-tsan
              -DCMAKE_BUILD_TYPE=RelWithDebInfo
              -DAUDIO_ENGINE_SANITIZE_TSAN=ON
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=OFF
              -DAUDIO_ENGINE_DECODERS_WAV=OFF
              -DAUDIO_ENGINE_DECODERS_OGG=OFF
              -DAUDIO_ENGINE_DECODERS_FLAC=OFF

      - name: Build
        run: cmake --build build-tsan --config RelWithDebInfo --parallel

      - name: Test
        working-directory: build-tsan
        env:
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
        # TSAN slows tests by ~5-15x; allow more wall time per test
        # via ctest's per-test timeout knob.
        run: ctest --output-on-failure -C RelWithDebInfo --timeout 600

  # ----------------------------------------------------------------
  # Job 2: build the GDExtension binding.
  #
  # Catches binding drift between releases. Today the engine builds
  # cleanly via the `build-and-test` job, but the GDExtension can
  # break independently (godot-cpp ABI changes, binding signature
  # drift). This job proves the binding compiles on every PR.
  #
  # Doesn't run unit tests — the binding's correctness is exercised
  # implicitly by the engine tests it links against. The win is
  # catching compile failures early.
  # ----------------------------------------------------------------
  build-gdextension:
    name: gdextension / ${{ matrix.platform }}
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Platform names match release.yml and nightly.yml so the
        # godot-cpp cache (keyed on platform + ref) is shared across
        # all three workflows. A successful cache populate by any
        # workflow benefits the others.
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            scons_platform: linux
          - os: windows-latest
            platform: windows-x86_64
            scons_platform: windows
          - os: macos-latest
            platform: macos-arm64
            scons_platform: macos

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install scons
        shell: bash
        run: pip install scons

      - name: Fetch single-header dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/fetch_miniaudio.sh
          bash scripts/fetch_decoders.sh
          bash scripts/fetch_nlohmann_json.sh

      - name: Fetch single-header dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call scripts\fetch_miniaudio.bat
          call scripts\fetch_decoders.bat
          call scripts\fetch_nlohmann_json.bat

      - name: Cache godot-cpp build
        id: godot-cpp-cache
        uses: actions/cache@v5
        with:
          path: third_party/godot-cpp
          key: godot-cpp-${{ matrix.platform }}-${{ env.GODOT_CPP_REF }}-v1

      - name: Clone + build godot-cpp (cache miss)
        if: steps.godot-cpp-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ env.GODOT_CPP_REF }}" \
              https://github.com/godotengine/godot-cpp.git \
              third_party/godot-cpp
          cd third_party/godot-cpp
          scons platform=${{ matrix.scons_platform }} target=template_release -j2

      - name: Install Opus dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopusfile-dev libopus-dev

      - name: Install Opus dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install opusfile opus

      - name: Cache vcpkg-installed packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-opus-static-md-v1

      - name: Install Opus dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          vcpkg install opusfile:x64-windows-static-md opus:x64-windows-static-md

      - name: Configure GDExtension
        shell: bash
        run: |
          # All three platforms verify the Opus-enabled build compiles.
          # Per-platform toolchain hints (must stay in sync with the
          # paralleling block in release.yml):
          #   - Windows: vcpkg toolchain file + static-md triplet.
          #   - macOS:   brew prefix on CMAKE_PREFIX_PATH so the linker
          #     finds Apple-Silicon Homebrew's /opt/homebrew/lib for
          #     the transitive `-lopus` from opusfile.pc. Without this,
          #     gdextension/macos-arm64 fails at link with
          #     `ld: library 'opus' not found` — diagnosed and fixed
          #     in v0.21.2 after release.yml's permission unblock
          #     finally surfaced the macOS link path as the next
          #     failure mode.
          TOOLCHAIN_FLAG=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            TOOLCHAIN_FLAG="-DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static-md"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            TOOLCHAIN_FLAG="-DCMAKE_PREFIX_PATH=$(brew --prefix)"
          fi
          cmake -S godot -B build-godot \
              -DGODOT_CPP_PATH="$PWD/third_party/godot-cpp" \
              -DCMAKE_BUILD_TYPE=Release \
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=ON \
              -DAUDIO_ENGINE_DECODERS_WAV=ON \
              -DAUDIO_ENGINE_DECODERS_OGG=ON \
              -DAUDIO_ENGINE_DECODERS_FLAC=ON \
              -DAUDIO_ENGINE_DECODERS_OPUS=ON \
              -DAUDIO_ENGINE_VOICE_OPUS=ON \
              ${TOOLCHAIN_FLAG}

      # godot-cpp generates ~3000 bindings .cpp files; each TU can
      # peak at ~700MB-1GB during template instantiation. Default
      # `--parallel` (= all cores) OOMs Linux/macOS runners (16GB and
      # 7GB respectively). --parallel 2 keeps us well under the ceiling.
      - name: Build GDExtension
        run: cmake --build build-godot --config Release --parallel 2

      - name: Verify binary was produced
        shell: bash
        run: |
          # On Linux:   build-godot/libgool_godot.so
          # On macOS:   build-godot/libgool_godot.dylib
          # On Windows: build-godot/Release/gool_godot.dll
          if [ -f build-godot/libgool_godot.so ] || \
             [ -f build-godot/libgool_godot.dylib ] || \
             [ -f build-godot/Release/gool_godot.dll ] || \
             [ -f build-godot/gool_godot.dll ]; then
              echo "GDExtension binary produced."
          else
              echo "ERROR: GDExtension binary not found at expected paths." >&2
              find build-godot -type f -name "gool_godot*" 2>/dev/null      >&2
              find build-godot -type f -name "libgool_godot*" 2>/dev/null   >&2
              exit 1
          fi


  # ----------------------------------------------------------------
  # Job: clang-tidy static analysis (v0.15.0 Tier-1 hardening).
  #
  # Runs the .clang-tidy configuration at repo root over all gool
  # sources. Linux-only (the checks themselves are platform-
  # independent; running on three platforms would triple cost without
  # adding signal). Treats the configured checks as errors at the CI
  # gate via --warnings-as-errors='*' so a PR that introduces a new
  # bugprone-*/performance-*/cert-* finding fails the build.
  #
  # Excludes:
  #   - third-party headers (miniaudio.h, opus, godot-cpp): covered
  #     by HeaderFilterRegex in .clang-tidy; the run-clang-tidy.py
  #     wrapper respects it.
  #   - tests/: useful to surface bugs in tests too, but the noisier
  #     test idioms (literal magic numbers in assertions, etc.)
  #     would create a long allowlist to maintain. v0.15.0 ships
  #     with library coverage only; tests can be added in a
  #     follow-up if/when the signal-to-noise ratio is high enough.
  #
  # Cost: ~3-5 min on a standard GH runner for a clean build.
  # ----------------------------------------------------------------
  clang-tidy:
    name: static-analysis / clang-tidy
    # v0.80.11: skip on pushes that touched no C++/build files.
    # clang-tidy has no signal on GDScript/docs/template changes,
    # and a full pass is ~20 min. The `changes` job decides.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    # Pinned to ubuntu-22.04 (GCC 13 + libstdc++13) because the
    # ubuntu-latest (24.04) image's libstdc++14 ships C++23 <format>
    # and <ranges> implementations that the available clang-tidy
    # frontend can't fully parse — its constraint evaluator disagrees
    # with libstdc++14 on whether `std::ranges::subrange` satisfies
    # the `range` concept inside the standard library's own headers,
    # producing dozens of `[clang-diagnostic-error]` lines that aren't
    # actual project issues. Surfaced in v0.21.2 when CI ran end-to-
    # end for the first time post-permission-fix. Pinning is the
    # least invasive fix; alternative would be installing clang-tidy
    # from the LLVM apt repo, which adds more yaml.
    runs-on: ubuntu-22.04
    # v0.21.4: continue-on-error so the gate is informational while
    # the ~70 acknowledged findings (40× init-variables, 8× reinterpret
    # _cast in binary loaders, narrowing/branch-clone/etc) are
    # systematically cleaned up. The findings have been latent the
    # entire time CI was upstream-broken; v0.21.2 was the first run
    # that exposed them. Re-enable as a blocking gate in v0.22 after
    # the cleanup pass.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-15
          # Symlink to a stable name so run-clang-tidy finds it.
          sudo ln -sf "$(which clang-tidy-15)" /usr/local/bin/clang-tidy

      - name: Configure (export compile_commands.json)
        run: cmake -S . -B build-tidy
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
              -DCMAKE_BUILD_TYPE=Release
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=ON
              -DAUDIO_ENGINE_DECODERS_WAV=ON
              -DAUDIO_ENGINE_DECODERS_OGG=ON
              -DAUDIO_ENGINE_DECODERS_FLAC=ON

      # Build first so generated headers (version.h commit hash,
      # nlohmann_json single-header, etc.) exist before clang-tidy
      # tries to parse the TUs that include them.
      - name: Build (populates generated headers)
        run: cmake --build build-tidy --config Release --parallel "$(nproc)"

      - name: Run clang-tidy on library sources
        shell: bash
        run: |
          set -euo pipefail
          # Build the file list from compile_commands.json so we only
          # check TUs that are actually part of the build. The jq filter
          # restricts to src/audio_engine/**.cpp; HeaderFilterRegex in
          # .clang-tidy handles transitive headers.
          jq -r '.[].file' build-tidy/compile_commands.json \
              | grep -E '/src/audio_engine/.*\.cpp$' \
              | grep -v 'bus_config_loader\.cpp$' \
              | sort -u > /tmp/tidy_files.txt
          echo "clang-tidy targets ($(wc -l < /tmp/tidy_files.txt) files):"
          cat /tmp/tidy_files.txt
          # Parallel run; --warnings-as-errors='*' makes any enabled
          # check a CI failure (matches the "broken windows" guidance
          # in the PVS-Studio terrible-tips article — a warning the
          # team learns to ignore is worse than none).
          # v0.80.11: fan out across all cores ($(nproc)) instead of a
          # hardcoded 2. Public-repo Linux runners have 4 vCPUs; per-
          # file analysis is independent, so this is a safe ~2x.
          xargs -a /tmp/tidy_files.txt -P "$(nproc)" -I{} \
              timeout 300 clang-tidy -p build-tidy --warnings-as-errors='*' {}

  # ----------------------------------------------------------------
  # Job: cppcheck (v0.16.0 — second static analyzer alongside clang-tidy).
  #
  # cppcheck and clang-tidy have overlapping but non-identical check
  # surfaces. cppcheck's dataflow analysis catches some classes of bugs
  # clang-tidy doesn't (e.g., shadow-variable misuse across blocks,
  # uninitialized-struct-member-on-some-path) and vice versa. Running
  # both gives independent signal at low marginal cost.
  #
  # Suppressions are inline (`// cppcheck-suppress`) rather than in a
  # config file so each waiver lives next to the code it justifies.
  # Linux-only; the checks themselves are platform-independent.
  # ----------------------------------------------------------------
  cppcheck:
    name: static-analysis / cppcheck
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck on library sources
        shell: bash
        run: |
          set -euo pipefail
          cppcheck \
              --enable=warning,style,performance,portability \
              --inline-suppr \
              --suppress=missingIncludeSystem \
              --suppress=unusedFunction \
              --suppress=constParameterReference \
              --suppress=constParameterPointer \
              --suppress=useStlAlgorithm \
              --error-exitcode=1 \
              --std=c++20 \
              --language=c++ \
              -I include -I src \
              src/audio_engine/

  # ----------------------------------------------------------------
  # Job: lizard cyclomatic-complexity gate (v0.16.0).
  #
  # Hard rule: no function may exceed cyclomatic complexity 15 or 60
  # lines. These thresholds match the NASA Power-of-Ten guidance for
  # safety-critical code; they are tight, but the v0.16.0 phase
  # decomposition of UpdateBody_ and MixVoiceIntoBus brought every
  # function in the library under the threshold (Phase 9 is the
  # closest to the line at ~155 lines — currently allowlisted; future
  # refactors should bring it under).
  #
  # Threshold of 15 is a well-known industry rule of thumb (above 15
  # is hard to fully unit-test). 60 lines comes directly from NASA's
  # Power-of-Ten rule 4.
  # ----------------------------------------------------------------
  lizard:
    name: static-analysis / lizard
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    # v0.21.4: continue-on-error so the gate reports the 11+
    # complexity violations (in addition to the 3 documented in
    # .lizard-whitelist) without blocking. These have been latent
    # the entire time CI was upstream-broken; v0.21.2 was the first
    # run that exposed them. Re-enable as a blocking gate in v0.22
    # alongside the MixVoiceSound_ / DrainCommands / ComputeLpfCoeffs
    # decomposition work, which will also clean up the bus config
    # and sound bank parsers (parseEffect/ParseFromJson/etc).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install lizard
        run: |
          pip install lizard

      - name: Run lizard on library sources
        run: |
          # -C 25 = max cyclomatic complexity 25
          # -L 250 = max length 250
          # -a 6  = max arguments 6 (matches MixVoiceMixContext-style design)
          # -W .lizard-whitelist = allowlist file documenting three known
          #     violators (MixVoiceSound_, DrainCommands, ComputeLpfCoeffs)
          #     with their v0.22.0 decomposition targets. The gate stays
          #     active for any NEW complexity regression; the existing
          #     three are acknowledged debt.
          # --warnings-only suppresses the per-function listing; CI shows
          #     only the violations.
          # Exit code is 1 on any violation outside the allowlist,
          # matching the strictness of the clang-tidy / cppcheck gates.
          lizard -C 25 -L 250 -a 6 \
                 -W .lizard-whitelist \
                 --warnings_only \
                 src/audio_engine/ include/audio_engine/

  # ----------------------------------------------------------------
  # Job: coverage (v0.16.0).
  #
  # Builds the engine with gcov instrumentation, runs the unit test
  # suite, and computes line coverage with gcovr. The percentage is
  # surfaced as a build-summary line and printed in full report form
  # to the workflow log. No PR comment automation yet — that lives
  # in a follow-up release once we have a baseline trend.
  #
  # Linux + GCC only (gcov toolchain). Branch coverage runs alongside
  # line coverage; both are reported.
  # ----------------------------------------------------------------
  coverage:
    name: coverage / gcovr
    # v0.80.18: skip on non-C++ changes.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install gcovr
        run: |
          pip install gcovr
          gcovr --version

      - name: Configure with coverage flags
        run: cmake -S . -B build-cov
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
              -DCMAKE_C_FLAGS="--coverage -O0 -g"
              -DCMAKE_EXE_LINKER_FLAGS="--coverage"
              -DCMAKE_SHARED_LINKER_FLAGS="--coverage"
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=ON
              -DAUDIO_ENGINE_DECODERS_WAV=ON
              -DAUDIO_ENGINE_DECODERS_OGG=ON
              -DAUDIO_ENGINE_DECODERS_FLAC=ON

      - name: Build
        run: cmake --build build-cov --parallel 2

      - name: Run tests
        working-directory: build-cov
        run: ctest --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr -r . --filter '(include|src)/audio_engine/' \
                --print-summary \
                --txt-metric line \
                --exclude-throw-branches \
                --exclude-unreachable-branches \
                build-cov

      - name: Generate XML for cobertura format
        run: |
          gcovr -r . --filter '(include|src)/audio_engine/' \
                --cobertura coverage.xml \
                build-cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30


  # ----------------------------------------------------------------
  # Job: GDScript lint (v0.21.1).
  #
  # Pure-Python parse check via gdtoolkit's `gdparse`. Catches
  # GDScript syntax errors without needing a Godot install — runs
  # in seconds and gates every PR.
  #
  # This job exists because the v0.21.0 release surfaced a
  # GDScript syntax error (unescaped quotes around "gool" in a
  # double-quoted string) that had shipped in all seven prefabs
  # since v0.13.0 — eight release cycles without any automated
  # detection. The bug was functionally invisible (the plugin
  # never actually loaded its prefabs in Godot) so no integration
  # test caught it. gdparse catches this class of bug at the
  # cheapest possible point in the pipeline.
  #
  # gdtoolkit pins to the 4.x major series matching our Godot
  # target (GODOT_CPP_REF: 4.4). The tool tracks Godot's grammar
  # changes within a major; minor mismatches inside 4.x are
  # accepted.
  # ----------------------------------------------------------------
  gdscript-lint:
    name: godot / gdscript-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdtoolkit
        run: |
          python -m pip install --upgrade pip
          pip install "gdtoolkit==4.*"
          gdparse --version || true

      - name: Parse every addon GDScript file
        run: |
          set -euo pipefail
          # `find -print0 | xargs -0` is the safe form against any
          # path with spaces; addon paths don't currently have them
          # but this stays portable if that changes. gdparse exits
          # 1 on the first parse error and prints the location +
          # reason; xargs propagates that exit code.
          find godot/addons -name "*.gd" -print0 \
            | xargs -0 -n 1 gdparse

      - name: Parse the smoke test's main.gd
        run: gdparse tests/godot/smoke/main.gd


  # ----------------------------------------------------------------
  # Job: Godot headless smoke (v0.21.1).
  #
  # Authoritative parse + load check. Downloads Godot 4.6.2 stable
  # for Linux, copies the addon into a minimal smoke project under
  # tests/godot/smoke/, runs that project headlessly, and lets
  # main.gd programmatically load() every .gd file under
  # res://addons/gool/. Any null return or any "Parse Error" /
  # "SCRIPT ERROR" line in the output fails the job.
  #
  # More authoritative than gdscript-lint because Godot's own
  # parser can catch grammar/semantic edge cases that gdtoolkit
  # doesn't always model perfectly. The two jobs are
  # complementary: gdscript-lint is fast and runs first; this one
  # is the authoritative gate.
  #
  # Scope: this smoke does NOT load the GDExtension binary. The
  # compiled .so/.dll/.dylib is the build-gdextension job's
  # domain. A binding-integrated smoke (downloads the artifact,
  # places it under addons/gool/bin/, runs prefab _ready paths)
  # is a follow-up — useful but heavier; the parse-level gate is
  # the immediate win.
  #
  # Godot version: pinned to 4.6.2-stable to match the project's
  # GODOT_CPP_REF (4.4 — highest stable godot-cpp branch). Per the
  # GDExtension forward-compatibility contract, a binary built
  # against godot-cpp 4.4 loads cleanly into Godot 4.6.x. When the
  # godot-cpp 4.5/4.6 stable branches eventually ship, bump this in
  # lockstep.
  # ----------------------------------------------------------------
  godot-headless-smoke:
    name: godot / headless-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download Godot 4.6.2 headless
        run: |
          set -euo pipefail
          GODOT_VERSION="4.6.2-stable"
          GODOT_ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q --show-progress \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          unzip -q "${GODOT_ZIP}"
          # Rename to `godot-engine`, NOT plain `godot`, because the
          # repo root has a `godot/` directory (the addon source) that
          # the unzipped binary would collide with. Without this rename,
          # `mv Godot_v..._linux.x86_64 godot` moves the binary file
          # INTO the existing godot/ directory as godot/Godot_v...,
          # then `./godot` runs the directory and fails with
          # "Is a directory" (exit 126). v0.21.3 fix.
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot-engine
          chmod +x godot-engine
          ./godot-engine --version

      - name: Copy addon into the smoke project
        run: |
          mkdir -p tests/godot/smoke/addons
          cp -r godot/addons/gool tests/godot/smoke/addons/gool
          ls -la tests/godot/smoke/addons/gool/

      - name: Run smoke (headless, parse every addon script)
        run: |
          set -euo pipefail
          # --headless: no display server (we're on a GH runner)
          # --quit-after 60: bail after 60 frames if main.gd's
          #     explicit get_tree().quit() didn't fire (defense-in-
          #     depth against an infinite-loop regression in main.gd
          #     itself).
          # We tee the output so the grep step below has a stable
          # file to scan even if Godot's exit code is masked by an
          # interleaved process-management layer.
          ./godot-engine --headless --path tests/godot/smoke --quit-after 60 \
            2>&1 | tee smoke.log
          echo ""
          echo "===== smoke.log scan ====="
          # v0.21.5: trust main.gd's verdict.
          #
          # We previously grepped for any "Parse Error:" / "SCRIPT
          # ERROR:" line as a failure signal. That over-fired in this
          # smoke project: Godot emits Parse Error lines for any
          # class_name cross-reference it can't resolve, and since the
          # smoke deliberately doesn't enable the gool plugin (we're
          # testing parse correctness without loading the GDExtension
          # binary), Godot's global class table is empty. References
          # like `AudioRelevancyFilter` inside networked_audio_event.gd
          # or `GoolSoundBank` inside gool_sound_bank_loader.gd then
          # fail type resolution and produce "Parse Error:" lines —
          # but the scripts still parse syntactically, load() returns
          # a non-null Resource, and they work in real Godot projects
          # where the plugin populates the class table normally.
          #
          # The semantically precise signal is main.gd's sentinel:
          #   - "[smoke] SMOKE OK"  → all 13 load() calls returned
          #     non-null (the scripts are at least syntactically
          #     parseable, which is what this smoke is for)
          #   - "[smoke] SMOKE FAIL" → at least one load() returned
          #     null (real parse-level failure, the v0.13.0/v0.21.3
          #     class of bug we want to catch)
          #   - neither → main.gd itself failed to run (e.g., a
          #     parse error in main.gd, the v0.21.4-era bug)
          if grep -q "SMOKE FAIL" smoke.log; then
            echo ""
            echo "::error::Godot headless smoke reported SMOKE FAIL — at least one addon script failed to load. Check the log above for the specific file and the Parse Error: line immediately preceding it."
            exit 1
          fi
          if ! grep -q "SMOKE OK" smoke.log; then
            echo ""
            echo "::error::Godot headless smoke did not produce SMOKE OK or SMOKE FAIL — main.gd may not have run at all. This usually means main.gd itself has a parse error; look for SCRIPT ERROR lines mentioning main.gd."
            exit 1
          fi
          echo "smoke passed (main.gd reported SMOKE OK)."

          # v0.23.6: belt-and-suspenders error-pattern grep.
          #
          # main.gd's SMOKE OK signal is the primary check: it walks
          # every addon script, calls load(), and verifies critical
          # scripts' static interfaces (specific constants + methods
          # are exposed). If anything fails, it reports SMOKE FAIL.
          #
          # As a fallback, also scan smoke.log for KNOWN-REAL-ERROR
          # patterns — strings that appear in Godot's stderr output
          # exclusively for actual parse/compile failures, never for
          # benign class_name resolution warnings. If any of these
          # patterns appear ANYWHERE in the log, fail the build
          # regardless of what main.gd reported.
          #
          # Why both? load()'s return-null contract isn't fully
          # documented for all parse-error categories. In v0.23.2 a
          # const-expression error in logging.gd shipped through
          # three releases (0.23.2, 0.23.3, 0.23.4) — we don't have
          # evidence that load() returned non-null for it in CI, but
          # the bug also wasn't caught, so something failed. Either
          # main.gd's load() check wasn't sufficient, OR the smoke
          # job wasn't actually running for those versions. Either
          # way, this fallback grep is cheap insurance.
          #
          # The pattern list is positive (whitelist of real errors)
          # rather than negative (suppression of false-positives)
          # because Godot's parser-error messages are surprisingly
          # specific and distinguishable.
          echo ""
          echo "===== known-real-error pattern scan ====="
          # v0.23.12: removed "because of a parser error" / "Could
          # not resolve class" patterns. Both appear in the SAME
          # Godot stderr line ("Parser Error: Could not resolve
          # class X, because of a parser error.") and that line is
          # emitted in headless mode for EVERY cross-script
          # class_name reference, because --headless doesn't
          # populate the global class registry the way --editor
          # does. Three release attempts (v0.23.6, v0.23.10,
          # v0.23.11) tried to make these patterns work as catch
          # mechanisms for real class_name cycles; all three caused
          # false positives in CI. The remaining patterns are all
          # syntactic checks that DO produce reliable signal in
          # headless mode.
          #
          # We lose: the ability to catch a newly-introduced
          # class_name cycle via CI grep. We accept: editor-time
          # error reporting catches these within seconds of opening
          # a project (proven by v0.23.10 episode — Brannen caught
          # the GoolLog ↔ GoolLogContext cycle on first F5 attempt,
          # before CI even completed). The grep was supposed to be
          # belt-and-suspenders; the belt (main.gd's SMOKE OK and
          # the editor-time check) is sufficient on its own.
          KNOWN_REAL_ERRORS=(
            "isn't a constant expression"
            "is not a constant expression"
            "Used tab character for indentation"
            "Mixed use of tabs and spaces"
            "Cyclic dependency between"
            "not found in base"
          )
          patterns_found=0
          for pattern in "${KNOWN_REAL_ERRORS[@]}"; do
            if grep -qF "$pattern" smoke.log; then
              patterns_found=$((patterns_found + 1))
              echo ""
              echo "::error::Detected real parser-error pattern: '$pattern'"
              echo "Matching lines:"
              grep -F "$pattern" smoke.log | sed 's/^/  /'
            fi
          done
          if [ "$patterns_found" -gt 0 ]; then
            echo ""
            echo "::error::Headless smoke saw $patterns_found pattern(s)"
            echo "::error::indicating real parse errors in the addon. Even"
            echo "::error::though main.gd may have reported SMOKE OK, these"
            echo "::error::patterns indicate actual problems that would"
            echo "::error::break the addon in real Godot projects."
            exit 1
          fi
          echo "no known-real-error patterns detected."

  # ----------------------------------------------------------------
  # Job: binary footprint report (v0.79.5).
  #
  # Re-added in v0.79.5 after rollback in v0.79.4. Originally added
  # in v0.79.1; rolled back when we (incorrectly) suspected it of
  # breaking workflow dispatch. The real cause was a GitHub Actions
  # outage on 2026-05-26. This re-add applies the defensive fixes
  # we'd identified during the diagnostic:
  #   - Use actions/checkout@v5 + upload-artifact@v5 (was @v4 — only
  #     inconsistency vs the rest of ci.yml)
  #   - Use `run: |` literal blocks for every multi-line command
  #     (was using folded plain scalar for the Configure step,
  #     which is technically valid YAML but unusual)
  #   - Simpler shell script — no nested heredocs
  #
  # Prints size / nm-by-size / objdump section breakdown for the
  # Release-built libaudio_engine.a (Linux). Uploaded as a workflow
  # artifact so PR reviewers can diff the report against main and
  # catch unintentional binary-size regressions before they ship.
  # ----------------------------------------------------------------
  footprint:
    name: footprint / binary-size report
    # v0.80.18: skip on non-C++ changes — binary size only meaningful
    # when source files affecting the build actually changed.
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    # Informational only — don't fail PRs on size yet. Once a few
    # runs of baseline data exist, set a budget and flip
    # continue-on-error off so regressions block merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Configure (Release)
        run: |
          cmake -S . -B build-size \
            -DCMAKE_BUILD_TYPE=Release \
            -DAUDIO_ENGINE_BACKEND_MINIAUDIO=ON \
            -DAUDIO_ENGINE_DECODERS_WAV=ON \
            -DAUDIO_ENGINE_DECODERS_OGG=ON \
            -DAUDIO_ENGINE_DECODERS_FLAC=ON

      - name: Build
        run: cmake --build build-size --config Release --parallel 2

      - name: Generate footprint report
        run: |
          set -euo pipefail
          mkdir -p footprint-report
          LIB=build-size/libaudio_engine.a
          if [ ! -f "$LIB" ]; then
            echo "::error::expected $LIB not found after Release build"
            ls -la build-size/ || true
            exit 1
          fi
          REPORT=footprint-report/report.txt
          {
            echo "=== gool footprint report ==="
            echo "git: $(git rev-parse --short HEAD)"
            echo "date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "--- file size (bytes) ---"
            wc -c "$LIB"
            echo ""
            echo "--- size --format=sysv ---"
            size --format=sysv "$LIB" 2>&1 | head -30 || true
            echo ""
            echo "--- top 30 symbols by size (nm --size-sort) ---"
            nm --size-sort --reverse-sort --print-size --demangle "$LIB" 2>&1 | head -30 || true
            echo ""
            echo "--- section breakdown (objdump -h) ---"
            objdump -h "$LIB" 2>&1 | head -40 || true
          } > "$REPORT"
          echo "--- report ---"
          cat "$REPORT"

      - name: Upload footprint report
        uses: actions/upload-artifact@v5
        with:
          name: footprint-report
          path: footprint-report/
          retention-days: 30

  # ----------------------------------------------------------------
  # Job: version sync check (v0.79.5).
  #
  # Re-added in v0.79.5 after rollback in v0.79.4. Verifies that
  # the 5 sources of version truth agree:
  #   1. include/audio_engine/version.h (kVersionString)
  #   2. CMakeLists.txt (project VERSION)
  #   3. godot/addons/gool/plugin.cfg (version=)
  #   4. examples/coop_shooter_template/addons/gool/plugin.cfg
  #   5. examples/voice_chat/addons/gool/plugin.cfg
  #
  # Catches the "I bumped version.h and forgot plugin.cfg" mistake
  # that happened across v0.78.0-v0.79.1 (every Godot install
  # showed "0.1.0" in the plugin dialog).
  # ----------------------------------------------------------------
  version-sync:
    name: version-sync / 5-source agreement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version sync
        run: |
          set -euo pipefail
          VH=$(grep -oP 'kVersionString = "\K[^"]+' include/audio_engine/version.h)
          CMK=$(grep -oP '^\s*VERSION \K[0-9.]+' CMakeLists.txt | head -1)
          PCFG_MAIN=$(grep -oP '^version="\K[^"]+' godot/addons/gool/plugin.cfg)
          PCFG_COOP=$(grep -oP '^version="\K[^"]+' examples/coop_shooter_template/addons/gool/plugin.cfg)
          PCFG_VOICE=$(grep -oP '^version="\K[^"]+' examples/voice_chat/addons/gool/plugin.cfg)
          echo "version.h:                                              $VH"
          echo "CMakeLists.txt:                                         $CMK"
          echo "godot/addons/gool/plugin.cfg:                           $PCFG_MAIN"
          echo "examples/coop_shooter_template/addons/gool/plugin.cfg:  $PCFG_COOP"
          echo "examples/voice_chat/addons/gool/plugin.cfg:             $PCFG_VOICE"
          if [ "$VH" != "$CMK" ] \
              || [ "$VH" != "$PCFG_MAIN" ] \
              || [ "$VH" != "$PCFG_COOP" ] \
              || [ "$VH" != "$PCFG_VOICE" ]; then
            echo "::error::version sync mismatch"
            echo "::error::  Bump ALL 5 sources to match"
            echo "::error::  version.h:                                              $VH"
            echo "::error::  CMakeLists.txt:                                         $CMK"
            echo "::error::  godot/addons/gool/plugin.cfg:                           $PCFG_MAIN"
            echo "::error::  examples/coop_shooter_template/addons/gool/plugin.cfg:  $PCFG_COOP"
            echo "::error::  examples/voice_chat/addons/gool/plugin.cfg:             $PCFG_VOICE"
            exit 1
          fi
          echo "all versions agree: $VH"
  # ----------------------------------------------------------------
  # Job: addon autoload safety scan (v0.79.8).
  #
  # Scans every .gd file under godot/addons/gool/ and the example
  # addons/gool/ copies for the v0.78.7-class bug: a class-body
  # reference to Gool / DialogueDirector / MultiplayerBridge.
  #
  # Addon scripts are parsed during the same compile pass that
  # registers these autoloads, so a bare reference at class-body
  # scope fails to resolve on first project open, cascading into a
  # parse-error storm. v0.78.7 fixed the 3 observed cases by hand;
  # v0.79.8 adds this scanner so it can't quietly regress when
  # someone adds a new prefab.
  #
  # Detector lives at scripts/check_addon_autoload_safety.py.
  # Run locally before pushing — same script, same result.
  # ----------------------------------------------------------------
  addon-autoload-safety:
    name: addon-safety / no class-body autoload refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Scan addon scripts
        run: |
          python3 scripts/check_addon_autoload_safety.py

  # ----------------------------------------------------------------
  # Job: LICENSE canonical-Apache-2.0 drift guard (v0.80.24).
  #
  # In May 2026, an MIT-license placeholder template (with the
  # literal "[YOUR NAME OR ORGANIZATION]" never filled in) overwrote
  # the actual Apache 2.0 LICENSE. README and fonts/README both
  # still correctly stated Apache 2.0; only the LICENSE file itself
  # was wrong. Caught during install verification, not by CI — this
  # is the gate that catches that next time.
  #
  # Eight pattern checks: two regression detectors (MIT header,
  # placeholder string), five Apache 2.0 structural integrity
  # markers (header, version, terms section, appendix, etc.), and
  # one project-specific (the Copyright line + third-party section).
  #
  # Detector lives at scripts/check_license_canonical.sh.
  # Run locally before pushing — same script, same result.
  # No path filter: LICENSE drift matters on every commit.
  # ----------------------------------------------------------------
  license-canonical:
    name: license / canonical Apache 2.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check LICENSE drift
        run: |
          bash scripts/check_license_canonical.sh
