name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is temporarily disabled — the engine builds and
        # tests pass on Linux + Windows; macOS has Apple-Clang-specific
        # build issues that we'll address separately. To re-enable, add
        # macos-latest back to the os list.
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # CI runs the silent NullAudioBackend — the test suite doesn't
        # need a real audio device. Miniaudio is opt-in for local
        # builds (see README); CI keeps it off so the build doesn't
        # depend on FetchContent network reliability.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DAUDIO_ENGINE_BACKEND_MINIAUDIO=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }}
