name: Release

# Triggered when a version tag is pushed (e.g. `git tag v0.2.0; git push --tags`).
# The leading `v` is stripped to derive the version (`0.2.0`); the version
# becomes part of the artifact filename so different releases coexist on
# the GitHub Releases page.
#
# Two artifact families per platform:
#
#   1. C++ static library archive (gool-X.Y.Z-PLATFORM.tar.gz / .zip)
#      For users embedding the engine into their own C++ build.
#      Contains: lib/libaudio_engine.a (or .lib), include/audio_engine/,
#      LICENSE, README, CHANGELOG.
#
#   2. Godot addon archive (gool-X.Y.Z-godot-addon-PLATFORM.tar.gz / .zip)
#      For users dropping gool into a Godot project. Contains an
#      `addons/gool/` directory ready to copy into a Godot project's
#      root, with the prebuilt GDExtension binary in `addons/gool/bin/`.
#      No C++ build required by the adopter. This is the artifact most
#      adopters want.
#
# See RELEASING.md for the full release procedure.

on:
  push:
    tags:
      - 'v*'

env:
  # godot-cpp branch to build against. Matches the `compatibility_minimum`
  # in godot/gool.gdextension. Bumping this to a newer Godot minor (4.3,
  # 4.4) requires also bumping the manifest's compatibility_minimum.
  GODOT_CPP_REF: '4.6'

jobs:
  release:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS support added in v0.11.6 (the Apple-Clang Wmaybe-uninitialized
        # pragma issue is fixed). If a release run fails on macOS but
        # Linux/Windows succeed, the simplest mitigation is to revert
        # this matrix entry and ship the other two while the fix is
        # iterated.
        #
        # macos-arm64 (not macos-universal): macos-latest is Apple
        # Silicon, and SCons platform=macos produces a single-arch
        # arm64 binary. The artifact name reflects this honestly.
        # An Intel Mac entry (macos-13 + arch=x86_64) is a follow-up.
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            archive_ext: tar.gz
            scons_platform: linux
            binary_path: build-godot/libgool_godot.so
          - os: windows-latest
            platform: windows-x86_64
            archive_ext: zip
            scons_platform: windows
            binary_path: build-godot/Release/gool_godot.dll
          - os: macos-latest
            platform: macos-arm64
            archive_ext: tar.gz
            scons_platform: macos
            binary_path: build-godot/libgool_godot.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          # Tag is like "v0.2.0". Strip the leading "v" → "0.2.0".
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="gool-${VERSION}-${{ matrix.platform }}"
          ADDON_ARCHIVE_NAME="gool-${VERSION}-godot-addon-${{ matrix.platform }}"
          echo "version=$VERSION"                       >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME"             >> "$GITHUB_OUTPUT"
          echo "addon_archive_name=$ADDON_ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "Derived version:        $VERSION"
          echo "C++ archive name:       $ARCHIVE_NAME"
          echo "Godot addon archive:    $ADDON_ARCHIVE_NAME"

      # ============================================================
      # Artifact 1: C++ static library archive
      # ============================================================

      - name: Configure (C++ library)
        # The C++ static-library archive is for users embedding
        # audio_engine in their own C++ project. They typically want
        # a minimal core (silent backend, no decoders) and link
        # whatever they need themselves. As of v0.11.9 the
        # CMakeLists.txt defaults are ON for these flags (Godot-side
        # adopters benefit), so this job explicitly forces them back
        # OFF to preserve the embedder-friendly static lib's character.
        run: cmake -S . -B build
              -DCMAKE_BUILD_TYPE=Release
              -DAUDIO_ENGINE_BUILD_EXAMPLES=OFF
              -DAUDIO_ENGINE_BUILD_TESTS=OFF
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=OFF
              -DAUDIO_ENGINE_DECODERS_WAV=OFF
              -DAUDIO_ENGINE_DECODERS_OGG=OFF
              -DAUDIO_ENGINE_DECODERS_FLAC=OFF

      - name: Build (C++ library)
        run: cmake --build build --config Release --target audio_engine --parallel

      - name: Stage C++ archive (Unix)
        if: runner.os != 'Windows'
        env:
          ARCHIVE_NAME: ${{ steps.version.outputs.archive_name }}
        run: |
          mkdir -p "stage/${ARCHIVE_NAME}/lib"
          mkdir -p "stage/${ARCHIVE_NAME}/include"
          find build -name "libaudio_engine*.a" -exec cp {} "stage/${ARCHIVE_NAME}/lib/" \;
          cp -r include/audio_engine "stage/${ARCHIVE_NAME}/include/"
          cp LICENSE      "stage/${ARCHIVE_NAME}/"
          cp README.md    "stage/${ARCHIVE_NAME}/"
          cp CHANGELOG.md "stage/${ARCHIVE_NAME}/"
          cd stage && tar -czf "../${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Stage C++ archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ steps.version.outputs.archive_name }}
        run: |
          New-Item -ItemType Directory -Force -Path "stage/$env:ARCHIVE_NAME/lib"     | Out-Null
          New-Item -ItemType Directory -Force -Path "stage/$env:ARCHIVE_NAME/include" | Out-Null
          Get-ChildItem -Path build -Recurse -Filter "audio_engine*.lib" | Copy-Item -Destination "stage/$env:ARCHIVE_NAME/lib/"
          Copy-Item -Recurse "include/audio_engine" "stage/$env:ARCHIVE_NAME/include/"
          Copy-Item "LICENSE"      "stage/$env:ARCHIVE_NAME/"
          Copy-Item "README.md"    "stage/$env:ARCHIVE_NAME/"
          Copy-Item "CHANGELOG.md" "stage/$env:ARCHIVE_NAME/"
          Compress-Archive -Path "stage/$env:ARCHIVE_NAME" -DestinationPath "$env:ARCHIVE_NAME.zip"

      # ============================================================
      # Artifact 2: Godot addon archive
      # ============================================================
      #
      # Steps:
      #   - Set up MSVC dev environment on Windows so cl.exe is on PATH
      #     (scons + cmake both need it for the GDExtension build)
      #   - Install scons (Python is preinstalled on GitHub runners)
      #   - Fetch the single-header deps (miniaudio, dr_libs, stb_vorbis)
      #   - Restore godot-cpp build from cache; on miss, clone + build
      #   - Configure + build the GDExtension via cmake
      #   - Stage addons/gool/ + the binary into a release directory
      #   - Pack as tar.gz / zip

      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install scons
        shell: bash
        run: pip install scons

      - name: Fetch single-header dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/fetch_miniaudio.sh
          bash scripts/fetch_decoders.sh

      - name: Fetch single-header dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call scripts\fetch_miniaudio.bat
          call scripts\fetch_decoders.bat

      - name: Cache godot-cpp build
        id: godot-cpp-cache
        uses: actions/cache@v4
        with:
          path: third_party/godot-cpp
          # Bump the trailing `v1` if godot-cpp build inputs change in
          # a way that requires invalidating the cache (rare).
          key: godot-cpp-${{ matrix.platform }}-${{ env.GODOT_CPP_REF }}-v1

      - name: Clone + build godot-cpp (cache miss)
        if: steps.godot-cpp-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ env.GODOT_CPP_REF }}" \
              https://github.com/godotengine/godot-cpp.git \
              third_party/godot-cpp
          cd third_party/godot-cpp
          scons platform=${{ matrix.scons_platform }} target=template_release -j2

      # ============================================================
      # Optional Opus support (DECODERS_OPUS + VOICE_OPUS)
      #
      # libopusfile is autotools, no CMake-friendly FetchContent path
      # — has to come from the system package manager. All three
      # platforms covered as of v0.11.10:
      #   - Linux:   apt install libopusfile-dev libopus-dev
      #   - macOS:   brew install opusfile opus
      #   - Windows: vcpkg install opusfile:x64-windows-static-md opus:...
      #              with the static-md triplet so the libs link into
      #              gool_godot.dll without dragging extra DLLs into
      #              the addon zip. windows-latest has vcpkg
      #              preinstalled at C:\vcpkg.
      # ============================================================

      - name: Install Opus dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopusfile-dev libopus-dev

      - name: Install Opus dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install opusfile opus

      - name: Cache vcpkg-installed packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          # Bump trailing version when vcpkg's opus/opusfile portfiles
          # change in a way that requires invalidating the cached binaries.
          key: vcpkg-windows-opus-static-md-v1

      - name: Install Opus dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          vcpkg install opusfile:x64-windows-static-md opus:x64-windows-static-md

      - name: Configure GDExtension
        shell: bash
        run: |
          # All three platforms now ship the addon binary with Opus
          # support enabled. Per-platform toolchain hints:
          #
          #   - Windows: vcpkg toolchain file + the static-md triplet
          #     so find_package(OpusFile) resolves to vcpkg's
          #     statically-linked /MD-CRT opus/opusfile packages.
          #
          #   - macOS:   brew prefix on CMAKE_PREFIX_PATH. Apple-Silicon
          #     Homebrew installs to /opt/homebrew, not the Intel-era
          #     /usr/local. CMake's default search paths don't include
          #     /opt/homebrew, so the transitive `-lopus` (declared
          #     by opusfile.pc's Requires: opus) fails at link time
          #     with `ld: library 'opus' not found` — even though the
          #     opusfile package itself resolves via pkg-config. Setting
          #     CMAKE_PREFIX_PATH lets find_library + the linker locate
          #     /opt/homebrew/lib/libopus.dylib.
          #
          #     `$(brew --prefix)` returns whichever prefix Homebrew is
          #     actually installed at (Apple Silicon: /opt/homebrew;
          #     Intel: /usr/local), so this works on both runner archs.
          TOOLCHAIN_FLAG=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            TOOLCHAIN_FLAG="-DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static-md"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            TOOLCHAIN_FLAG="-DCMAKE_PREFIX_PATH=$(brew --prefix)"
          fi
          cmake -S godot -B build-godot \
              -DGODOT_CPP_PATH="$PWD/third_party/godot-cpp" \
              -DCMAKE_BUILD_TYPE=Release \
              -DAUDIO_ENGINE_BACKEND_MINIAUDIO=ON \
              -DAUDIO_ENGINE_DECODERS_WAV=ON \
              -DAUDIO_ENGINE_DECODERS_OGG=ON \
              -DAUDIO_ENGINE_DECODERS_FLAC=ON \
              -DAUDIO_ENGINE_DECODERS_OPUS=ON \
              -DAUDIO_ENGINE_VOICE_OPUS=ON \
              ${TOOLCHAIN_FLAG}

      # godot-cpp generates ~3000 bindings .cpp files; each TU can
      # peak at ~700MB-1GB during template instantiation. Default
      # `--parallel` (= all cores) OOMs Linux/macOS runners (16GB and
      # 7GB respectively). --parallel 2 keeps us well under the ceiling.
      - name: Build GDExtension
        run: cmake --build build-godot --config Release --parallel 2

      - name: Stage addon archive (Unix)
        if: runner.os != 'Windows'
        env:
          ADDON_ARCHIVE_NAME: ${{ steps.version.outputs.addon_archive_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
        run: |
          # v0.22.1: recursive copy of the whole addons/gool tree.
          #
          # Pre-v0.22.1 versions of this step enumerated files
          # explicitly (runtime_singleton.gd, audio_relevancy_filter.gd,
          # plugin.gd, plugin.cfg, prefabs/). That worked when those
          # were the only addon files, but silently dropped every new
          # file added under godot/addons/gool/ that wasn't manually
          # added to this list. The result: v0.21.0 through v0.22.0
          # all shipped addon archives missing
          # `resources/gool_sound_bank.gd` (v0.21.0 addition),
          # `resources/gool_folder_sound_bank.gd` (v0.22.0),
          # and `editor/sound_name_inspector.gd` (v0.22.0). Users who
          # installed via gool-install.cmd never got those files.
          #
          # The recursive copy is forward-compatible: any future
          # addition under godot/addons/gool/ ships automatically
          # without a YAML change. The post-stage verification step
          # below also catches drift in case this assumption breaks.
          dest="stage/${ADDON_ARCHIVE_NAME}/addons/gool"
          mkdir -p "${dest}/bin"
          # Recursive copy of the entire addon source tree. The `.`
          # at the end of source is a cp-ism meaning "the contents
          # of this directory, not the directory itself" — without
          # it we'd get nested addons/gool/gool/.
          cp -r godot/addons/gool/. "${dest}/"
          # gdextension manifest (lives one level up from addons/gool/
          # in source). Always copied since it's not under
          # addons/gool/.
          cp godot/gool.gdextension "${dest}/"
          # Built binary into bin/. bin/ is intentionally not part
          # of the source tree (build output, not source), so it
          # was created above and is populated only here.
          cp "${BINARY_PATH}" "${dest}/bin/"
          # Top-level docs + license.
          cp LICENSE      "stage/${ADDON_ARCHIVE_NAME}/"
          cp README.md    "stage/${ADDON_ARCHIVE_NAME}/"
          cp CHANGELOG.md "stage/${ADDON_ARCHIVE_NAME}/"
          cp SETUP.md     "stage/${ADDON_ARCHIVE_NAME}/"
          cd stage && tar -czf "../${ADDON_ARCHIVE_NAME}.tar.gz" "${ADDON_ARCHIVE_NAME}"

      - name: Verify staged archive contents match source (Unix)
        if: runner.os != 'Windows'
        env:
          ADDON_ARCHIVE_NAME: ${{ steps.version.outputs.addon_archive_name }}
        run: |
          # v0.22.1 regression guard. The pre-v0.22.1 staging step
          # explicitly enumerated files, which silently dropped any
          # new source addition that wasn't manually added to the
          # YAML — a class of bug that went undetected for 6 releases
          # (v0.21.0 through v0.22.0). This step compares the source
          # tree under godot/addons/gool/ against the staged archive
          # and fails the build if anything in source isn't in the
          # archive (modulo bin/, which is build output, not source).
          dest="stage/${ADDON_ARCHIVE_NAME}/addons/gool"
          echo "=== Source tree (godot/addons/gool/) ==="
          src_files=$(cd godot/addons/gool && find . -type f \
                      ! -path './bin/*' ! -name '.gdignore' \
                      | sed 's|^\./||' | sort)
          echo "$src_files" | sed 's/^/  /'
          echo ""
          echo "=== Staged archive contents (excluding bin/) ==="
          dst_files=$(cd "${dest}" && find . -type f \
                      ! -path './bin/*' \
                      | sed 's|^\./||' | sort)
          echo "$dst_files" | sed 's/^/  /'
          echo ""
          missing=$(comm -23 <(echo "$src_files") <(echo "$dst_files"))
          if [ -n "$missing" ]; then
            echo "::error::Source files missing from staged addon archive:"
            echo "$missing" | sed 's/^/  /'
            echo ""
            echo "This usually means a new file was added under"
            echo "godot/addons/gool/ but the release.yml staging step"
            echo "didn't pick it up. With the v0.22.1 recursive-copy"
            echo "fix this should not happen unless cp -r failed or"
            echo "an exclusion (like .gdignore) was added to source."
            exit 1
          fi
          echo "OK: all source addon files present in the staged archive."

      - name: Stage addon archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ADDON_ARCHIVE_NAME: ${{ steps.version.outputs.addon_archive_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
        run: |
          # v0.22.1: see the Unix variant above for the bug-history
          # and rationale comment. Same fix: recursive copy of the
          # whole addons/gool source tree instead of an explicit
          # per-file list that silently dropped any new files added
          # without a YAML update.
          $dest = "stage\$env:ADDON_ARCHIVE_NAME\addons\gool"
          New-Item -ItemType Directory -Force -Path "$dest\bin" | Out-Null
          # Recursive copy of all addon source contents. The Copy-Item
          # source glob `addons\gool\*` plus -Recurse copies the
          # contents (not the gool/ directory itself) into $dest,
          # matching the Unix `cp -r ./.` semantics.
          Copy-Item godot\addons\gool\* $dest -Recurse -Force
          Copy-Item godot\gool.gdextension $dest -Force
          Copy-Item $env:BINARY_PATH "$dest\bin\" -Force
          Copy-Item LICENSE      "stage\$env:ADDON_ARCHIVE_NAME\" -Force
          Copy-Item README.md    "stage\$env:ADDON_ARCHIVE_NAME\" -Force
          Copy-Item CHANGELOG.md "stage\$env:ADDON_ARCHIVE_NAME\" -Force
          Copy-Item SETUP.md     "stage\$env:ADDON_ARCHIVE_NAME\" -Force
          Compress-Archive -Path "stage\$env:ADDON_ARCHIVE_NAME" -DestinationPath "$env:ADDON_ARCHIVE_NAME.zip"

      - name: Verify staged archive contents match source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ADDON_ARCHIVE_NAME: ${{ steps.version.outputs.addon_archive_name }}
        run: |
          # Windows variant of the v0.22.1 regression guard.
          #
          # v0.22.2: this step must run AFTER the Stage Windows step
          # (which produces $dest). In v0.22.1 the YAML had this
          # block placed BEFORE the Stage step, so on Windows the
          # verify ran first against a non-existent $dest, failed
          # with "Cannot find path", and the Stage + Upload steps
          # never got to run. Result: v0.22.1 release had Linux +
          # macOS addon archives but no Windows archive.
          #
          # v0.22.2 also replaces the v0.22.1 Compare-Object -PassThru
          # filter with a simpler `Where-Object -notin` form. The
          # original Compare-Object logic was correct but harder to
          # reason about than the direct subtraction; the simpler
          # form is more obviously right and matches the Unix comm
          # -23 semantics one-for-one.
          $dest = "stage\$env:ADDON_ARCHIVE_NAME\addons\gool"
          $srcRoot = "godot\addons\gool"
          # Pre-resolve absolute paths so they're not re-evaluated
          # inside the ForEach-Object loop (cheap, but also a
          # defensive measure: if either path becomes unresolvable
          # mid-pipeline due to a race, fail with a clearer error
          # at this resolve call rather than deep inside the loop).
          $srcAbs = (Resolve-Path $srcRoot).Path
          $dstAbs = (Resolve-Path $dest).Path
          $srcFiles = Get-ChildItem -Path $srcRoot -File -Recurse `
                      | Where-Object { $_.FullName -notmatch '\\bin\\' -and $_.Name -ne '.gdignore' } `
                      | ForEach-Object { $_.FullName.Substring($srcAbs.Length + 1) -replace '\\','/' } `
                      | Sort-Object
          $dstFiles = Get-ChildItem -Path $dest -File -Recurse `
                      | Where-Object { $_.FullName -notmatch '\\bin\\' } `
                      | ForEach-Object { $_.FullName.Substring($dstAbs.Length + 1) -replace '\\','/' } `
                      | Sort-Object
          Write-Host "=== Source tree (godot\addons\gool\) ==="
          $srcFiles | ForEach-Object { Write-Host "  $_" }
          Write-Host ""
          Write-Host "=== Staged archive contents (excluding bin\) ==="
          $dstFiles | ForEach-Object { Write-Host "  $_" }
          Write-Host ""
          # Plain "source files missing from dest" computation. No
          # Compare-Object semantics quirks; just direct
          # subtraction: keep items from $srcFiles that aren't in
          # $dstFiles. @() forces array semantics so a single-item
          # result doesn't accidentally degenerate to a string.
          $missing = @($srcFiles | Where-Object { $_ -notin $dstFiles })
          if ($missing.Count -gt 0) {
            Write-Host "::error::Source files missing from staged addon archive:"
            $missing | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "OK: all source addon files present in the staged archive."

      # ============================================================
      # Upload both artifacts to the release
      # ============================================================

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.version.outputs.archive_name }}.${{ matrix.archive_ext }}
            ${{ steps.version.outputs.addon_archive_name }}.${{ matrix.archive_ext }}
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
