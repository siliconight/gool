<?xml version="1.0" encoding="UTF-8"?>
<!-- GoolDebugOverlay icon: a small debug-meter glyph with bars
     suggesting the realtime stats display. Inherits the gool
     family's flat-line aesthetic. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Outer rounded rectangle: the "panel" -->
  <rect x="1" y="2" width="14" height="12" rx="1.5"
        fill="none" stroke="#8da5b3" stroke-width="1"/>
  <!-- VU-like horizontal bars (stats rows) -->
  <rect x="3"  y="4.5" width="3" height="1.4" fill="#8da5b3"/>
  <rect x="6.5" y="4.5" width="2" height="1.4" fill="#8da5b3" opacity="0.5"/>
  <rect x="3"  y="7"   width="5" height="1.4" fill="#8da5b3"/>
  <rect x="8.5" y="7"   width="3" height="1.4" fill="#8da5b3" opacity="0.5"/>
  <rect x="3"  y="9.5" width="2" height="1.4" fill="#8da5b3"/>
  <rect x="5.5" y="9.5" width="1" height="1.4" fill="#8da5b3" opacity="0.5"/>
  <!-- Bottom indicator dot (a "live" pulse) -->
  <circle cx="13" cy="11.5" r="1.2" fill="#5fa57e"/>
</svg>
