<?xml version="1.0" encoding="UTF-8"?>
<!-- VoiceCipher — microphone capsule with a padlock overlaid,
     conveying "voice + cryptographic protection." 16x16,
     monochromatic Godot editor-icon style. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <g fill="#e0e0e0" stroke="#e0e0e0" stroke-linejoin="round" stroke-linecap="round">
    <!-- Microphone capsule (smaller, top-left) -->
    <rect x="2.5" y="2" width="2.5" height="5" rx="1.2" ry="1.2"/>
    <path d="M 1.5 6.5 Q 1.5 8 3.75 8 Q 6 8 6 6.5"
          stroke-width="0.8" fill="none"/>
    <line x1="3.75" y1="8" x2="3.75" y2="9.5" stroke-width="0.8"/>
    <line x1="2.5" y1="9.5" x2="5" y2="9.5" stroke-width="0.9"/>

    <!-- Padlock body (bottom-right) -->
    <rect x="8" y="8" width="6.5" height="5.5" rx="0.8" ry="0.8"/>
    <!-- Padlock shackle -->
    <path d="M 9.5 8 L 9.5 6.5 Q 9.5 4.8 11.25 4.8 Q 13 4.8 13 6.5 L 13 8"
          stroke-width="1.1" fill="none"/>
    <!-- Keyhole on lock body -->
    <circle cx="11.25" cy="10.5" r="0.7" fill="#1a1d22" stroke="none"/>
    <rect x="11.05" y="10.7" width="0.4" height="1.4" fill="#1a1d22" stroke="none"/>
  </g>
</svg>
