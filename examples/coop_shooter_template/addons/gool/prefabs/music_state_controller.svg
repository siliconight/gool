<?xml version="1.0" encoding="UTF-8"?>
<!-- MusicStateController — eighth note with a small state indicator dot. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <g fill="#e0e0e0">
    <!-- Note stem -->
    <rect x="9" y="2" width="1.2" height="9"/>
    <!-- Note flag -->
    <path d="M10.2 2 Q13 3.5 13 6 Q12 4.5 10.2 4.5 Z"/>
    <!-- Note head: ellipse, slightly tilted look via positioning -->
    <ellipse cx="8.4" cy="11.2" rx="2.4" ry="1.7"/>
    <!-- State indicator: small circle outline, lower-left -->
    <circle cx="3.2" cy="12.5" r="1.6" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    <circle cx="3.2" cy="12.5" r="0.6"/>
  </g>
</svg>
